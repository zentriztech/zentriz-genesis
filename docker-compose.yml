# Zentriz Genesis — ambiente local
# Namespace: zentriz-genesis (project name = namespace para recursos Docker)
# Uso: docker compose up -d | Variáveis: .env (DOCKER_NAMESPACE, etc.)

name: zentriz-genesis

services:
  api:
    build:
      context: ./applications/services/api-node
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # IMPORTANTE: dentro do Docker, API_BASE_URL DEVE ser http://api:3000 (nome do serviço).
      # A API envia esse valor ao runner; se for localhost, o runner não consegue gravar diálogo.
      # Colocado APÓS env_file para garantir que sobrescreve o valor do .env.
      - API_BASE_URL=http://api:3000
      - UPLOAD_DIR=/shared/uploads
      - RUNNER_SERVICE_URL=http://runner:8001
      - GITHUB_APP_PRIVATE_KEY_FILE=/run/secrets/zentriz-autonomy.2026-04-24.private-key.pem
      # Fixo: dentro do container sempre /project-files; bind mount mapeia para o host
      - PROJECT_FILES_ROOT=/project-files
      # api e runner compartilham o mesmo volume /shared/uploads — path-based delivery (sem base64)
      - RUNNER_UPLOAD_DIR=/shared/uploads
      # Path do host para project-files — usado pelo watchdog e para exibição ao usuário
      - HOST_PROJECT_FILES_ROOT=${HOST_PROJECT_FILES_ROOT:-/Users/mac/zentriz-files}
      - PGHOST=${PGHOST:?PGHOST nao definido no .env}
      - PGUSER=${PGUSER:?PGUSER nao definido no .env}
      - PGPASSWORD=${PGPASSWORD:?PGPASSWORD nao definido no .env}
      - PGDATABASE=${PGDATABASE:?PGDATABASE nao definido no .env}
      - PGPORT=${PGPORT:-5432}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET nao definido no .env}
      # Telegram Bot (FT-09) — deixar vazio para desabilitar notificações
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - TELEGRAM_WEBHOOK_PATH=${TELEGRAM_WEBHOOK_PATH:-wh/change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zentriz-genesis_uploads:/shared/uploads
      - ${HOST_PROJECT_FILES_ROOT:-./zentriz-files}:/project-files
      - ${HOME}/Documents/zentriz/github:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      runner:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis_dev
      POSTGRES_DB: zentriz_genesis
    ports:
      - "5432:5432"
    volumes:
      - zentriz-genesis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis -d zentriz_genesis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - zentriz-genesis_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: applications/orchestrator/agents/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-900}
      - REQUEST_TIMEOUT_MAX=${REQUEST_TIMEOUT_MAX:-7200}
      - SHOW_TRACEBACK=${SHOW_TRACEBACK:-true}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - AWS_PROFILE=${AWS_PROFILE:-}
      - GENESIS_LLM_PROVIDER=${GENESIS_LLM_PROVIDER:-anthropic}
      - GENESIS_AWS_REGION=${GENESIS_AWS_REGION:-us-east-1}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-32000}
      - CLAUDE_MAX_TOKENS_ENGINEER=${CLAUDE_MAX_TOKENS_ENGINEER:-32000}
      - CLAUDE_MAX_TOKENS_PM=${CLAUDE_MAX_TOKENS_PM:-32000}
      - CLAUDE_MAX_TOKENS_DEV=${CLAUDE_MAX_TOKENS_DEV:-32000}
      - CLAUDE_MAX_TOKENS_QA=${CLAUDE_MAX_TOKENS_QA:-16000}
      - CLAUDE_MAX_TOKENS_SPEC_INTAKE=${CLAUDE_MAX_TOKENS_SPEC_INTAKE:-12000}
      - CLAUDE_MAX_TOKENS_DEV_REWORK=${CLAUDE_MAX_TOKENS_DEV_REWORK:-48000}
      - CLAUDE_RETRY_ATTEMPTS=${CLAUDE_RETRY_ATTEMPTS:-3}
      - MAX_REPAIRS=${MAX_REPAIRS:-2}
      - CIRCUIT_BREAKER_THRESHOLD=${CIRCUIT_BREAKER_THRESHOLD:-3}
      - GENESIS_API_TOKEN=${GENESIS_API_TOKEN:-}
      - GENESIS_API_URL=http://api:3000
    env_file:
      - .env
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: applications/orchestrator/Dockerfile.runner
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - API_AGENTS_URL=${API_AGENTS_URL:-http://agents:8000}
      # APÓS env_file para sobrescrever localhost do .env
      - API_BASE_URL=http://api:3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-900}
      - REQUEST_TIMEOUT_MAX=${REQUEST_TIMEOUT_MAX:-7200}
      - SHOW_TRACEBACK=${SHOW_TRACEBACK:-true}
      - AGENT_TIMEOUT_ENGINEER=${AGENT_TIMEOUT_ENGINEER:-900}
      - AGENT_TIMEOUT_CTO=${AGENT_TIMEOUT_CTO:-900}
      - AGENT_TIMEOUT_PM=${AGENT_TIMEOUT_PM:-900}
      - AGENT_TIMEOUT_DEV=${AGENT_TIMEOUT_DEV:-900}
      - AGENT_TIMEOUT_QA=${AGENT_TIMEOUT_QA:-600}
      - AGENT_TIMEOUT_MONITOR=${AGENT_TIMEOUT_MONITOR:-600}
      - AGENT_TIMEOUT_DEVOPS=${AGENT_TIMEOUT_DEVOPS:-900}
      - AGENT_HTTP_RETRY_ON_TIMEOUT=${AGENT_HTTP_RETRY_ON_TIMEOUT:-2}
      - MAX_QA_REWORK=${MAX_QA_REWORK:-3}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-32000}
      - CLAUDE_MAX_TOKENS_ENGINEER=${CLAUDE_MAX_TOKENS_ENGINEER:-32000}
      - CLAUDE_MAX_TOKENS_PM=${CLAUDE_MAX_TOKENS_PM:-32000}
      - CLAUDE_MAX_TOKENS_DEV=${CLAUDE_MAX_TOKENS_DEV:-32000}
      - CLAUDE_MAX_TOKENS_QA=${CLAUDE_MAX_TOKENS_QA:-16000}
      - CLAUDE_MAX_TOKENS_DEV_REWORK=${CLAUDE_MAX_TOKENS_DEV_REWORK:-48000}
      # Fixo: dentro do container sempre /project-files; bind mount mapeia para o host
      - PROJECT_FILES_ROOT=/project-files
      - PIPELINE_FULL_STACK=${PIPELINE_FULL_STACK:-true}
      - ZENTRIZ_CONNECT_ROOT=/zentriz-connect
      # Host path dos project files — usado pelo runner para instrução de execução local
      - HOST_PROJECT_FILES_ROOT=${HOST_PROJECT_FILES_ROOT:-/Users/mac/zentriz-files}
      # GAP-P6: token para o runner sincronizar métricas (complexity_hint, run_count) com a API
      - GENESIS_API_TOKEN=${GENESIS_API_TOKEN:-}
      - GENESIS_API_URL=http://api:3000
      # TASK-FULL-TEST: path do Claude Code CLI no host (montado via bind-mount abaixo)
      - CLAUDE_BIN=${CLAUDE_BIN:-/host-claude/claude}
      # TASK-FULL-TEST: URL do full-test-server.py rodando no host
      - FULL_TEST_SERVER_URL=http://host.docker.internal:7878
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zentriz-genesis_uploads:/shared/uploads
      - ${HOST_PROJECT_FILES_ROOT:-./zentriz-files}:/project-files
      - ${HOST_PROJECT_FILES_ROOT:-./zentriz-files}/.runner-state:/orchestrator/state
      - ${HOME}/.aws:/root/.aws:ro
      - ${ZENTRIZ_CONNECT_PATH:-../zentriz-connect}:/zentriz-connect:ro
    depends_on:
      - agents
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # FT-14: Zentriz Cyborg — aceita projetos automaticamente após pipeline completar
  # Modo Produto: definir CYBORG_PRODUCT_ID para monitorar produto específico
  # Modo Solitário: deixar CYBORG_PRODUCT_ID vazio para monitorar todos os projetos standalone
  cyborg:
    build:
      context: .
      dockerfile: applications/orchestrator/Dockerfile.runner
    command: ["python3", "-m", "orchestrator.zentriz_cyborg"]
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:3000
      - GENESIS_API_TOKEN=${GENESIS_API_TOKEN:-}
      - PROJECT_FILES_ROOT=/project-files
      - CYBORG_POLL_INTERVAL=${CYBORG_POLL_INTERVAL:-60}
      - CYBORG_MAX_FIX_CYCLES=${CYBORG_MAX_FIX_CYCLES:-2}
      - CYBORG_PLAYBOOK_TIMEOUT=${CYBORG_PLAYBOOK_TIMEOUT:-300}
      - CYBORG_PRODUCT_ID=${CYBORG_PRODUCT_ID:-}
    volumes:
      - ${HOST_PROJECT_FILES_ROOT:-./zentriz-files}:/project-files
      - zentriz-genesis_uploads:/shared/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
      - runner
    restart: unless-stopped

  genesis-web:
    build:
      context: ./applications/apps/genesis-web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* são embutidas no bundle em build time — obrigatório definir no .env
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL nao definido no .env}
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  zentriz-genesis_pgdata:
  zentriz-genesis_redis:
  zentriz-genesis_uploads:
