# Zentriz Genesis — Project Types Policy
#
# Fonte ÚNICA de política técnica por project_type. Consumido em runtime pelo
# pipeline_context.py (Python) e em build-time convertido para policies.json
# usado por Node/TS (Telegram, Portal, api-node).
#
# Guardrail: adicionar/alterar tipo ⇒ bump `version` + linha no PR description.
# Precedência: CONTRACT LAW (Charter/LEI 13) > user Delta (LEI EVO) > type_policy > spec
#
# Ver README.md para schema completo e política de linguagem PT-BR/EN.

version: "0.3.0"

# ── type_aliases ─────────────────────────────────────────────────────────────
# Normaliza saídas de detectProjectType (telegram.ts:955-963) + subtipos do
# portal que devem cair em tipos canônicos Wave 0. Aplicado ANTES de resolver
# a policy do tipo.
#
# Regra: backend_api_python NÃO tem alias para backend_api — bugs Python 1-9
# são incompatíveis com bugs Node/Drizzle N1-N8.
type_aliases:
  mobile_app:         mobile_crossplatform    # telegram detectProjectType output
  mobile_ios:         mobile_crossplatform    # portal subtype
  mobile_android:     mobile_crossplatform    # portal subtype
  backend_api_node:   backend_api             # variante nomeada
  static_site:        frontend_landing        # telegram detectProjectType output
  landing_page:       frontend_landing        # legado spec/page.tsx:553
  web_app:            frontend_dashboard      # legado spec/page.tsx:558
  frontend_web:       frontend_dashboard      # legado CTO SYSTEM_PROMPT
  frontend_webapp:    frontend_dashboard      # telegram detectProjectType output

# ── defaults ─────────────────────────────────────────────────────────────────
# Herdado por todos os tipos exceto quando sobrescrito.
defaults:
  scaffold:
    - Dockerfile
    - start.sh                   # feedback_port_check: obrigatório lsof antes de subir
    - .env.example
    - README.md
  required_routes:
    strict: []                   # BLOCKER se ausente
    expected: []                 # WARN se ausente
  required_components: []
  forbidden_patterns: []
  smell_signals: []
  fingerprint:
    required_tokens: []          # tokens que DEVEM aparecer no código gerado
    forbidden_tokens: []         # tokens que NÃO PODEM aparecer
    synonyms_pt_br: {}           # equivalências PT-BR para evitar falso positivo
  meta:
    requires_runbook: false
    warn_on_default: false
    blocks_generation: false

# ── groups ───────────────────────────────────────────────────────────────────
# Herança intermediária (universal → group → subtype). Merge é ADITIVO em
# listas (união em forbidden_patterns, required_routes, required_components).
groups:
  backend:
    scaffold:
      - docker-compose.yml
    required_routes:
      strict:
        - "GET /health"
    fingerprint:
      forbidden_tokens:
        - "hero-section"
        - "landing-hero"
        - "AppShell"             # web pattern não faz sentido em backend

  frontend:
    scaffold:
      - next.config.js
      - docker-compose.yml
    fingerprint:
      forbidden_tokens:
        - "Prisma"               # feedback_nodejs_drizzle: usar Drizzle

  fullstack:
    scaffold:
      - docker-compose.yml

  mobile:
    scaffold:
      - app.json
      - App.tsx
    fingerprint:
      forbidden_tokens:
        - "localStorage"         # web-only API
        - "AppShell"

  bot:
    scaffold:
      - Dockerfile

# ── types ────────────────────────────────────────────────────────────────────
# 5 tipos-piloto Wave 0 + _default estrito + other.
# Cada tipo herda de defaults → groups[X] → type explicit override.
types:

  # ── backend_api (Node.js) ──────────────────────────────────────────────────
  backend_api:
    inherit_from: backend
    labels:
      pt_br: "🔌 API REST (Node)"
      en: "REST API (Node)"
    scaffold:
      - app.ts
      - drizzle.config.ts
    required_routes:
      strict:
        - "POST /auth/login"
        - "GET /health"
      expected:
        - "GET /api/<recurso>"
    required_components:
      - "envelope {data, meta}"
      - "prefixo /api/"
      - "JWT middleware"
      - "error handler com details:{}"
    forbidden_patterns:
      # Bugs Node/Drizzle validados (N1-N8, P1-P13, F1-F6)
      - "Prisma"                              # feedback_nodejs_drizzle: usar Drizzle
      - "seed.mjs no Dockerfile"              # N5: seed sempre fora
      - "findAll("                            # N6: usar findMany do Drizzle
      - "rota sem app.register"               # N7: registrar no app.ts
      - "204 com type:"                       # N8: 204 sem body
      - "details omitido no errSchema"        # N3
      - "migrations vazias"                   # N2
      - "content-type form-urlencoded no login"  # L1: Fastify não aceita
      - "campo 'token' em vez de 'access_token'"  # L2
    fingerprint:
      required_tokens:
        strong:
          - "fastify"
          - "drizzle"
          - "/auth/login"
        soft:
          - "helmet"
          - "cors"
      forbidden_tokens:
        - "prisma"
        - "next.config"
        - "AppShell"
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20"
      - "Fastify"
      - "Drizzle ORM"
      - "PostgreSQL 16"
    smell_signals:
      - "seed.mjs referenciado no Dockerfile CMD"
      - "rotas criadas em arquivos mas sem app.register no app.ts"
      - "prefixo duplicado ex /api/api/orders"

  # ── backend_api_python (FastAPI) ───────────────────────────────────────────
  backend_api_python:
    inherit_from: backend
    labels:
      pt_br: "🐍 API REST (Python)"
      en: "REST API (Python)"
    scaffold:
      - pyproject.toml           # Python 1: NUNCA setuptools/setup.py
      - main.py
      - alembic.ini
    required_routes:
      strict:
        - "POST /auth/login"
        - "GET /health"
      expected:
        - "GET /api/<recurso>"
    required_components:
      - "envelope {data, meta}"
      - "Pydantic field names lowercase"     # Python 2
      - "python-multipart no pyproject"      # Python 5
      - "passlib[bcrypt]==1.7.4"             # Python 6
      - "IntegrityError → 409"               # Python 8
    forbidden_patterns:
      # Bugs Python/FastAPI validados (Python 1-9)
      - "setuptools no pyproject"            # Python 1
      - "Pydantic field UpperCase"           # Python 2
      - "prefixo /api/ duplicado no router"  # Python 3
      - "ENUM asyncpg sem cast explícito"    # Python 4
      - "python-multipart ausente"           # Python 5: form data quebra
      - "passlib bcrypt sem pin 1.7.4"       # Python 6
      - "Insomnia format v4"                 # Python 7: usar v5
      - "IntegrityError → 500"               # Python 8: deve ser 409
      - "Pydantic v1 style Config"           # Python 9: usar model_config
    fingerprint:
      required_tokens:
        strong:
          - "fastapi"
          - "sqlalchemy"
          - "alembic"
        soft:
          - "pydantic"
          - "uvicorn"
      forbidden_tokens:
        - "setuptools"
        - "setup.py"
        - "AppShell"
        - "next.config"
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Python 3.11"
      - "FastAPI"
      - "SQLAlchemy 2"
      - "Alembic"
      - "PostgreSQL 16"
    smell_signals:
      - "arquivo setup.py em vez de pyproject.toml"
      - "field ClienteId com uppercase (Pydantic quebra em snake_case)"
      - "form POST sem python-multipart instalado"

  # ── frontend_dashboard (Dashboard / Admin Panel) ──────────────────────────
  frontend_dashboard:
    inherit_from: frontend
    labels:
      pt_br: "📊 Dashboard / Admin"
      en: "Dashboard / Admin Panel"
    scaffold:
      - AppShell.tsx
    required_routes:
      strict:
        - "/"                    # redirect para /login ou /dashboard
        - "/login"
        - "/dashboard"
      expected:
        - "/configuracoes"
    required_components:
      - "<AppShell> wrapping rotas autenticadas"
      - "middleware.ts com auth guard"
      - "KPI cards no dashboard"
      - "cliente HTTP com envelope {data, meta}"
      - "token field 'access_token' (não 'token')"   # L2
    forbidden_patterns:
      # Regras W1-W15 Dev MUI + L1-L19 Manager Integration
      - "cores hardcoded fora de brand tokens"        # W1
      - "hero-section"                                # não é landing
      - "landing-hero"
      - "sitemap.xml"                                 # é dashboard, não site público
      - "Prisma"                                      # é frontend puro
      - "mock estático em vez de fetch"               # scaffold pattern
      - "página / renderizando dashboard direto"      # deve redirect
      - "campo 'token' em fetch de login"             # L2: usar access_token
      - "content-type form-urlencoded no login"       # L1
    fingerprint:
      required_tokens:
        strong:
          - "AppShell"
          - "next"
          - "/dashboard"
        soft:
          - "@mui/material"
          - "recharts"
          - "middleware"
      forbidden_tokens:
        - "hero-section"
        - "landing-hero"
        - "sitemap"
        - "prisma"
      synonyms_pt_br:
        dashboard:
          - "painel"
          - "gerenciador"
        settings:
          - "configuracoes"
          - "ajustes"
        reports:
          - "relatorios"
    stack_when_charter_silent:
      - "Next.js 15 (App Router)"
      - "MUI (Material UI)"
      - "Recharts"
      - "TypeScript"
    smell_signals:
      - "rota / renderiza KPIs em vez de redirect"
      - "AppShell ausente em rotas autenticadas"
      - "menu com hrefs para rotas inexistentes"

  # ── frontend_landing (Landing Page) ────────────────────────────────────────
  frontend_landing:
    inherit_from: frontend
    labels:
      pt_br: "🏠 Landing Page"
      en: "Landing Page"
    scaffold:
      - sitemap.xml
      - robots.txt
    required_routes:
      strict:
        - "/"                    # hero com CTA real
        - "/sobre"
        - "/contato"
      expected:
        - "/legal"               # LGPD
        - "/privacidade"
        - "/termos"
    required_components:
      - "hero section com CTA real (não Lorem)"
      - "seções institucionais com conteúdo real"
      - "OG meta tags"
      - "form de contato funcional"
      - "sitemap.xml no repo"
    forbidden_patterns:
      - "<AppShell>"                                  # web app pattern
      - "KPI cards"                                   # é dashboard, não landing
      - "dashboard layout"
      - "mock/scaffold em /"                          # home deve ser real
      - "conteúdo Lorem em /sobre"
      - "AppShell wrapping /"
      - "next-auth"                                   # landing sem login
    fingerprint:
      required_tokens:
        strong:
          - "hero"
          - "cta"
          - "/sobre"
        soft:
          - "meta"
          - "og:"
          - "sitemap"
      forbidden_tokens:
        - "AppShell"
        - "KPICard"
        - "dashboard"
        - "middleware.ts"
      synonyms_pt_br:
        cta:
          - "chamada"
          - "acao"
        hero:
          - "capa"
          - "destaque"
    stack_when_charter_silent:
      - "Next.js 15 (App Router)"
      - "MUI (Material UI)"
      - "TypeScript"
    smell_signals:
      - "/ renderiza dashboard com KPIs"              # OrienteMe V4/V7 bug
      - "menu lateral com hrefs de admin"
      - "middleware.ts com auth guard (landing não tem login)"
      - "sitemap.xml ausente"

  # ── mobile_crossplatform (Wave 1 — política completa v0.2.0) ─────────────
  mobile_crossplatform:
    inherit_from: mobile
    labels:
      pt_br: "📱 Mobile Multiplataforma"
      en: "Mobile Cross-Platform"
    scaffold:
      - eas.json                                      # Expo Application Services
      - app.config.ts
    required_routes:
      strict:
        - "Splash"                                    # tela inicial obrigatória
        - "Login"                                     # auth flow inicial
        - "Home"                                      # rota autenticada raiz
      expected:
        - "Settings"
    required_components:
      - "@react-navigation/native + stack ou tabs"
      - "AuthContext ou similar (Context API)"
      - "cliente HTTP com envelope {data, meta}"      # padrão Genesis
      - "AsyncStorage para token (nunca localStorage)"
      - "SplashScreen com Expo"
    forbidden_patterns:
      - "localStorage"                                # web-only API
      - "document."                                   # web-only
      - "window."                                     # web-only
      - "AppShell.tsx"                                # padrão web dashboard
      - "next/*"                                      # nunca importar Next.js
      - "sitemap.xml"                                 # é mobile, não site
      - "hero-section"                                # padrão web landing
      - "middleware.ts"                               # Next-specific
    fingerprint:
      required_tokens:
        strong:
          - "react-native"
          - "@react-navigation"
          - "AsyncStorage"
        soft:
          - "expo"
          - "SplashScreen"
          - "SafeAreaView"
      forbidden_tokens:
        - "localStorage"
        - "AppShell"
        - "sitemap"
        - "next.config"
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Expo SDK 51+"
      - "React Native 0.74+"
      - "TypeScript"
      - "@react-navigation/native"
      - "react-native-async-storage"
    smell_signals:
      - "uso de localStorage/document/window (web-only APIs)"
      - "AppShell.tsx (padrão web dashboard)"
      - "import next/* ou react-router-dom (não é web)"
      - "fetch sem headers Content-Type application/json"

  # ── fullstack_saas (Wave 1 — união backend_api + frontend_dashboard + auth) ───
  # SaaS multi-tenant típico: API + dashboard admin + auth-service separado (LEI 11).
  fullstack_saas:
    inherit_from: fullstack
    labels:
      pt_br: "☁️ SaaS (Fullstack)"
      en: "SaaS (Fullstack)"
    scaffold:
      - Dockerfile                                    # herdado defaults
      - start.sh
      - .env.example
      - README.md
      - docker-compose.yml                            # orquestra api + web + auth-service
      # union backend_api + frontend_dashboard scaffolds ficam em subpastas
      # apps/api/Dockerfile, apps/api/app.ts, apps/api/drizzle.config.ts
      # apps/web/next.config.js, apps/web/AppShell.tsx
      # apps/auth/... (LEI 11 — serviço separado)
    required_routes:
      strict:
        # API side
        - "POST /api/auth/login"
        - "GET /api/health"
        - "GET /api/<recurso>"
        # Frontend side
        - "/"                                         # redirect para /login ou /dashboard
        - "/login"
        - "/dashboard"
      expected:
        - "/configuracoes"
        - "GET /api/tenant"                           # multi-tenancy típico
    required_components:
      # API
      - "envelope {data, meta}"
      - "prefixo /api/"
      - "JWT middleware (backend)"
      - "error handler com details:{}"
      # Frontend
      - "<AppShell> wrapping rotas autenticadas"
      - "middleware.ts com auth guard"
      - "cliente HTTP com envelope"
      - "token field 'access_token'"
      # Auth
      - "auth-service em serviço/container separado (LEI 11)"
    forbidden_patterns:
      # Herda defaults + tabus específicos de SaaS
      - "Prisma"                                       # usar Drizzle no backend
      - "monolito único (backend + frontend no mesmo container)"
      - "seed.mjs no Dockerfile"                       # bug Node N5
      - "findAll("                                     # bug Node N6 — usar findMany
      - "rota sem app.register"                        # bug Node N7
      - "content-type form-urlencoded no login"        # Fastify não aceita
      - "campo 'token' em vez de 'access_token'"       # L2
      - "hero-section"                                 # é dashboard, não landing
      - "página / renderizando dashboard direto"       # deve redirect
      - "auth embutido no api-node principal"          # LEI 11 — separar
    fingerprint:
      required_tokens:
        strong:
          - "fastify"
          - "drizzle"
          - "AppShell"
          - "/api/auth/login"
          - "/dashboard"
        soft:
          - "@mui/material"
          - "helmet"
          - "middleware"
      forbidden_tokens:
        - "prisma"
        - "hero-section"
        - "landing-hero"
      synonyms_pt_br:
        dashboard:
          - "painel"
          - "gerenciador"
        settings:
          - "configuracoes"
          - "ajustes"
    stack_when_charter_silent:
      - "Node 20 + Fastify + Drizzle + PostgreSQL 16 (backend)"
      - "Next.js 15 + MUI + TypeScript (frontend)"
      - "auth-service separado (LEI 11)"
    smell_signals:
      - "backend e frontend no mesmo Dockerfile/container"
      - "auth embutido no api-node principal (não em auth-service)"
      - "página / renderiza dashboard direto sem redirect"
      - "docker-compose sem service auth-service"

  # ── bot_chat (Wave 1 — bot conversacional: Telegram, Discord, WhatsApp) ──
  bot_chat:
    inherit_from: bot
    labels:
      pt_br: "💬 Bot Conversacional"
      en: "Chat Bot"
    scaffold:
      - Dockerfile
      - start.sh
      - .env.example
      # handler principal — nome varia por stack (bot.ts, bot.py, main.py)
    required_routes:
      strict:
        - "/start"                                     # comando universal em bots
        - "/help"
      expected:
        - "1 comando de domínio (varia por produto)"
    required_components:
      - "handler de webhook OU polling loop"
      - "token do bot em .env (nunca hardcoded)"
      - "error boundary por comando"
      - "logs estruturados (comando + user_id + resultado)"
    forbidden_patterns:
      - "token hardcoded no código"
      - "server HTTP paralelo sem justificativa"
      - "banco de dados sem justificativa"           # bot simples não precisa
      - "AppShell"                                   # padrão web
      - "next/*"
      - "hero-section"
    fingerprint:
      required_tokens:
        strong:
          - "bot"
        soft:
          - "webhook"
          - "polling"
          - ".env"
      forbidden_tokens:
        - "AppShell"
        - "next.config"
        - "hardcoded_token"                          # meta-token
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + Fastify (webhook) OU python-telegram-bot / discord.py (polling)"
      - "TypeScript ou Python 3.11"
    smell_signals:
      - "token do bot em código-fonte (não .env)"
      - "servidor Fastify paralelo ao webhook sem justificativa"
      - "sem error handler — bot crasha em qualquer input inválido"

  # ═════════════════════════════════════════════════════════════════════════
  # WAVE 2 — Subtipos com override (v0.3.0)
  # ═════════════════════════════════════════════════════════════════════════

  # ── frontend_ecommerce ─────────────────────────────────────────────────────
  # Loja online orientada a produto — vitrine + carrinho + checkout.
  # Herda frontend base + adiciona rotas de venda.
  frontend_ecommerce:
    inherit_from: frontend
    labels:
      pt_br: "🛒 E-commerce (Frontend)"
      en: "E-commerce (Frontend)"
    scaffold:
      - AppShell.tsx
    required_routes:
      strict:
        - "/"
        - "/produtos"
        - "/produto/[id]"                        # detalhe
        - "/carrinho"
        - "/checkout"
      expected:
        - "/login"
        - "/pedidos"                             # área cliente
        - "/sobre"
    required_components:
      - "carrinho persistente (Context ou Zustand)"
      - "checkout com 3+ steps (endereço, pagamento, revisão)"
      - "listagem paginada com filtros"
      - "cliente HTTP com envelope {data, meta}"
    forbidden_patterns:
      - "hero-section sem CTA para produtos"     # landing sem loja
      - "dashboard KPI cards em / "              # é loja, não admin
      - "AppShell wrapping / sem grid de produtos"
    fingerprint:
      required_tokens:
        strong:
          - "produto"
          - "carrinho"
        soft:
          - "checkout"
          - "@mui/material"
      forbidden_tokens: []
      synonyms_pt_br:
        cart:
          - "carrinho"
        product:
          - "produto"
          - "item"
        checkout:
          - "finalizar"
    stack_when_charter_silent:
      - "Next.js 15 + MUI + TypeScript"
    smell_signals:
      - "página / sem vitrine de produtos"
      - "checkout em rota única (deveria ter steps)"

  # ── backend_graphql ────────────────────────────────────────────────────────
  backend_graphql:
    inherit_from: backend
    labels:
      pt_br: "🔗 GraphQL API"
      en: "GraphQL API"
    scaffold:
      - "schema.graphql"                         # SDL
      - "app.ts"
    required_routes:
      strict:
        - "POST /graphql"                        # endpoint principal
        - "GET /health"
    required_components:
      - "resolvers em módulos separados"
      - "schema SDL versionado"
      - "context com auth + dataloader"
    forbidden_patterns:
      - "REST /api/*"                            # é GraphQL, não híbrido sem justificativa
      - "SQL cru em resolvers"                   # deve usar repository/ORM
    fingerprint:
      required_tokens:
        strong:
          - "graphql"
          - "resolver"
        soft:
          - "dataloader"
          - "apollo"
          - "graphql-yoga"
      forbidden_tokens: []
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + Apollo Server ou GraphQL Yoga"
      - "TypeScript"
      - "PostgreSQL 16 via Drizzle"
    smell_signals:
      - "endpoints REST paralelos sem justificativa"

  # ── backend_worker ─────────────────────────────────────────────────────────
  # Job runner / cron / queue consumer — sem HTTP público.
  backend_worker:
    inherit_from: backend
    labels:
      pt_br: "🤖 Worker / Job"
      en: "Worker / Job"
    scaffold:
      - "worker.ts"                              # entrypoint
    required_routes:
      strict: []                                 # sem HTTP público
      expected:
        - "GET /health"                          # opcional para orquestrador
    required_components:
      - "connection ao broker (Redis/BullMQ/RabbitMQ) ou cron scheduler"
      - "graceful shutdown (SIGTERM handler)"
      - "logs estruturados por job"
      - "retry policy explícita"
    forbidden_patterns:
      - "Fastify server como principal"          # é worker, não API
      - "cron sem retry"
    fingerprint:
      required_tokens:
        strong:
          - "worker"
        soft:
          - "bullmq"
          - "redis"
          - "cron"
      forbidden_tokens:
        - "fastify.listen"
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + BullMQ + Redis (queue)"
      - "OR node-cron (agendamento)"
    smell_signals:
      - "worker que abre porta HTTP como principal"
      - "sem graceful shutdown"

  # ── fullstack_ecommerce ────────────────────────────────────────────────────
  # E-commerce completo: união backend_api + frontend_ecommerce.
  fullstack_ecommerce:
    inherit_from: fullstack
    labels:
      pt_br: "🛒 E-commerce (Fullstack)"
      en: "E-commerce (Fullstack)"
    scaffold:
      - "docker-compose.yml"
    required_routes:
      strict:
        - "POST /api/auth/login"
        - "GET /api/health"
        - "GET /api/produtos"
        - "POST /api/carrinho"
        - "POST /api/pedidos"
        - "/"
        - "/produtos"
        - "/produto/[id]"
        - "/carrinho"
        - "/checkout"
      expected:
        - "GET /api/pedidos"
        - "/pedidos"
    required_components:
      - "envelope {data, meta}"
      - "prefixo /api/"
      - "carrinho persistente"
      - "checkout multi-step"
    forbidden_patterns:
      - "Prisma"
      - "monolito único (backend + frontend no mesmo container)"
      - "hero-section sem CTA para produtos"
    fingerprint:
      required_tokens:
        strong:
          - "fastify"
          - "carrinho"
          - "checkout"
        soft:
          - "@mui/material"
          - "drizzle"
      forbidden_tokens:
        - "prisma"
      synonyms_pt_br:
        cart:
          - "carrinho"
        product:
          - "produto"
    stack_when_charter_silent:
      - "Node 20 + Fastify + Drizzle (backend)"
      - "Next.js 15 + MUI (frontend)"

  # ── bot_scraper ────────────────────────────────────────────────────────────
  # Scraping / crawling / data extraction — não conversacional.
  bot_scraper:
    inherit_from: bot
    labels:
      pt_br: "🕷️ Scraper / Crawler"
      en: "Scraper / Crawler"
    scaffold:
      - "scraper.ts"
    required_routes:
      strict: []                                 # sem HTTP
      expected:
        - "GET /health"
    required_components:
      - "cliente HTTP com retry + rate limit"
      - "parser (Cheerio/Playwright/BeautifulSoup)"
      - "storage do resultado (DB, S3, file)"
      - "respeita robots.txt e delay entre requests"
    forbidden_patterns:
      - "bypass de robots.txt"                   # ético + legal
      - "sem rate limit entre requests"
      - "hardcoded target URL sem env var"
    fingerprint:
      required_tokens:
        strong:
          - "scraper"
        soft:
          - "cheerio"
          - "playwright"
          - "beautifulsoup"
      forbidden_tokens: []
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + Playwright OR Python 3.11 + BeautifulSoup"

  # ── lib_cli ────────────────────────────────────────────────────────────────
  # CLI publicável (npm/pypi) — sem servidor, sem UI.
  lib_cli:
    inherit_from: null                           # não é backend/frontend/mobile/bot
    labels:
      pt_br: "🖥️ CLI (Biblioteca executável)"
      en: "CLI (Executable Library)"
    scaffold:
      - "bin/index.ts"                           # OU bin/main.py
      - "package.json"                           # OU pyproject.toml
      - "README.md"
    required_routes:
      strict: []
      expected: []
    required_components:
      - "argparse/commander/click para parsing"
      - "--help com uso completo"
      - "exit codes documentados (0=OK, 1=erro, 2=uso incorreto)"
      - "logs em stderr, dados em stdout (Unix convention)"
    forbidden_patterns:
      - "console.log de erros (deve ser stderr)"
      - "process.exit(0) em erro"
    fingerprint:
      required_tokens:
        strong:
          - "commander"                           # OR click, argparse
        soft:
          - "chalk"
          - "yargs"
      forbidden_tokens: []
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + Commander OR Python 3.11 + Click"

  # ── lib_plugin ─────────────────────────────────────────────────────────────
  # Plugin para VS Code / Figma / Cursor / navegador — não roda standalone.
  lib_plugin:
    inherit_from: null
    labels:
      pt_br: "🧩 Plugin / Extensão"
      en: "Plugin / Extension"
    scaffold:
      - "package.json"
      - "manifest.json"                          # VS Code / navegador
      - "README.md"
    required_routes:
      strict: []
      expected: []
    required_components:
      - "activation events / permissões declaradas no manifest"
      - "handler para lifecycle (activate/deactivate)"
      - "settings/config expostos"
      - "empty state e erro amigáveis"
    forbidden_patterns:
      - "manifest sem activationEvents"          # plugin nunca inicia
      - "process.exit"                           # crasha o host
    fingerprint:
      required_tokens:
        strong:
          - "manifest"
          - "activate"
        soft:
          - "vscode"
      forbidden_tokens:
        - "process.exit"
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "Node 20 + TypeScript + Extension API (VS Code / Chrome)"

  # ── infra_cicd ─────────────────────────────────────────────────────────────
  # Pipeline CI/CD como produto — GitHub Actions / GitLab CI / Terraform.
  infra_cicd:
    inherit_from: null
    labels:
      pt_br: "⚙️ Pipeline CI/CD"
      en: "CI/CD Pipeline"
    scaffold:
      - ".github/workflows/deploy.yml"           # OR .gitlab-ci.yml
      - "README.md"
    required_routes:
      strict: []
      expected: []
    required_components:
      - "job de build documentado"
      - "job de test documentado"
      - "job de deploy com env condicional"
      - "secrets referenciados sem hardcoding"
      - "rollback documentado"
    forbidden_patterns:
      - "secret em plaintext no workflow"
      - "sem matriz de status (build sempre passa)"
      - "deploy sem approval em produção"
    fingerprint:
      required_tokens:
        strong:
          - "workflow"                            # workflows/*
        soft:
          - "jobs"
          - "actions"
      forbidden_tokens: []
      synonyms_pt_br: {}
    stack_when_charter_silent:
      - "GitHub Actions (YAML)"
      - "OR GitLab CI (YAML)"
      - "OR Terraform + Terragrunt"

  # ── other (tipo declarado mas fora do piloto) ──────────────────────────────
  # Charter DEVE justificar em "## Motivação" + repo DEVE ter RUNBOOK.md.
  other:
    inherit_from: null
    labels:
      pt_br: "❓ Outro (declarado)"
      en: "Other (declared)"
    scaffold:
